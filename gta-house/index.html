<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA-style house — Three.js explorer</title>
<style>
  html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family:-apple-system,Segoe UI,Roboto,sans-serif; }
  #app { position:relative; width:100vw; height:100vh; }
  canvas { display:block; width:100%; height:100%; }

  #hud, #room-label {
    position:absolute; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.65); color:#fff; padding:6px 16px; border-radius:20px;
    z-index:10; pointer-events:none; font-size:13px;
  }
  #hud { top:12px; }
  #room-label { top:52px; font-weight:600; opacity:0; transition:opacity .4s; }

  #mode-btns { position:absolute; bottom:18px; left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:10; }
  #mode-btns button {
    background:rgba(0,0,0,0.6); color:#fff; border:1px solid rgba(255,255,255,0.3);
    padding:7px 16px; border-radius:20px; cursor:pointer; font-size:13px;
  }
  #mode-btns button.active { background:#fff; color:#111; }

  #crosshair {
    position:absolute; top:50%; left:50%; width:6px; height:6px; margin:-3px;
    border-radius:50%; background:rgba(255,255,255,0.85); z-index:9; display:none;
  }
</style>
</head>
<body>
<div id="app">
  <div id="hud">Click to look around · WASD / arrows to walk · Shift to run</div>
  <div id="room-label">Living room</div>
  <div id="mode-btns">
    <button id="btn-day" class="active">Day</button>
    <button id="btn-night">Night</button>
    <button id="btn-orbit" class="active">Orbit view</button>
    <button id="btn-walk">Walk inside</button>
  </div>
  <div id="crosshair"></div>
  <canvas id="c"></canvas>
</div>

<!-- Three.js r128 (matches the geometry/material API used in main.js) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="js/colliders.js"></script>
<script src="js/build-exterior.js"></script>
<script src="js/build-interior.js"></script>
<script src="js/controls.js"></script>
<script src="js/main.js"></script>
</body>
</html>
